# Example reverse proxy for pgAdmin via a shared nginx stack (/dockers/nginx).
#
# Usage:
#   1. Copy to /dockers/nginx/server/conf.d/ and rename:
#        cp pgadmin.example.conf /dockers/nginx/server/conf.d/pgadmin.example.com.conf
#   2. Replace pgadmin.example.com with your domain.
#   3. Set SSL certificate paths (or use Let's Encrypt).
#   4. Reload nginx: docker exec nginx nginx -s reload
#
# Requirements:
#   - nginx and pgadmin on the same docker-lan network
#   - pgadmin container listens on port 80 inside the network (hostname: pgadmin)

server {
    listen 80;
    server_name pgadmin.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen              443 ssl;
    server_name         pgadmin.example.com;

    access_log /var/log/nginx/pgadmin.example.com.access.log;
    error_log  /var/log/nginx/pgadmin.example.com.error.log;

    client_max_body_size 0;
    underscores_in_headers on;

    # SSL — replace with your certificates
    ssl_certificate     /usr/share/ssl/ismartypro.crt;
    ssl_certificate_key /usr/share/ssl/ismartypro.key;

    ssl_stapling on;
    ssl_stapling_verify on;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_headers_hash_max_size 512;
        proxy_headers_hash_bucket_size 64;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_redirect off;

        # Docker DNS: re-resolve pgadmin hostname when the container is recreated
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $pgadmin_upstream pgadmin;
        proxy_pass http://$pgadmin_upstream:80;
    }
}
