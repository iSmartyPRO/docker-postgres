# Пример: pgAdmin на подпути https://example.com/pgadmin4/
#
# Использование:
#   1. Скопируйте фрагмент location в существующий server {} блок nginx.
#   2. В docker-compose pgadmin добавьте переменную окружения:
#        PGADMIN_CONFIG_SCRIPT_NAME: '"/pgadmin4"'
#   3. Пересоздайте контейнер pgadmin: docker compose up -d pgadmin
#
# Важно: путь в location, X-Script-Name и SCRIPT_NAME должны совпадать.

    location /pgadmin4/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Script-Name     /pgadmin4;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_redirect off;

        resolver 127.0.0.11 valid=30s ipv6=off;
        set $pgadmin_upstream pgadmin;
        proxy_pass http://$pgadmin_upstream:80/;
    }
